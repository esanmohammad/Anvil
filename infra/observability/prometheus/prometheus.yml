# Prometheus 3.x — receives OTLP metrics from the collector + scrapes
# the collector's self-metrics. Local on-disk TSDB.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: anvil-local

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

# Native OTLP receiver is enabled via the --web.enable-otlp-receiver flag
# in docker-compose. No additional config needed here — it just exposes
# /api/v1/otlp on the same HTTP port.

storage:
  tsdb:
    out_of_order_time_window: 30m
