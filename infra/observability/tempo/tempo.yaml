# Single-binary Tempo — local trace storage with TraceQL.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

# Required for Grafana's traceql queryType (raw TraceQL search) — without
# this, the datasource hits a gRPC code path that returns
# "backend TraceQL search queries are not supported".
stream_over_http_enabled: true

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h    # 2-day local retention is plenty for dev

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: anvil-local
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
      generate_native_histograms: both
