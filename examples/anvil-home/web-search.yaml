# web-search.yaml — pin a specific search backend.
#
# Anvil auto-detects the first configured provider in the order:
#   BRAVE_SEARCH_API_KEY → TAVILY_API_KEY → EXA_API_KEY → SERPAPI_API_KEY → SEARXNG_BASE_URL
#
# Drop this file at ~/.anvil/web-search.yaml to OVERRIDE auto-detect
# and force a specific provider regardless of which keys are set.
#
# Provider vocabulary (closed): brave | exa | tavily | serpapi | searxng

# Default (commented) — let auto-detect pick.
# provider: brave

# Force SearxNG even when other API keys are present (useful when
# you self-host and want to stop sending queries to vendor APIs):
# provider: searxng

# Force Tavily for AI-friendly snippets:
# provider: tavily

# Notes on SearxNG:
#   - Set SEARXNG_BASE_URL=http://localhost:8888 (no trailing slash;
#     no /search suffix — Anvil appends that automatically).
#   - Optional SEARXNG_API_KEY for hardened public instances.
#   - Enable JSON output in your instance's settings.yml:
#       search:
#         formats: [html, json]
