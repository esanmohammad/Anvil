name: Release

# Triggers on `vX.Y.Z` tag pushes. Bump the changed packages' versions
# in their respective package.json, commit, then `git tag v0.1.2 && git push --tags`.
# scripts/publish-changed.mjs reads each package.json's version and only
# publishes the ones whose version isn't already on the npm registry —
# so an unchanged sub-package is silently skipped.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # contents: write       → softprops/action-gh-release uses this to create the GitHub Release
      # id-token: write       → npm provenance OIDC token (sigstore attestation)
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      # The cli's build script transitively builds dashboard (vite + tsc)
      # and bundles it into dist/dashboard. Building the cli last therefore
      # exercises every TypeScript project reference in the monorepo.
      - name: Build leaf packages
        run: |
          npm -w @esankhan3/anvil-agent-core run build
          npm -w @esankhan3/anvil-knowledge-core run build
          npm -w @esankhan3/anvil-memory-core run build
          npm -w @esankhan3/anvil-convention-core run build
          npm -w @esankhan3/anvil-core-pipeline run build

      - name: Build code-search-mcp
        run: cd packages/code-search-mcp && node build.mjs

      - name: Build cli (also builds dashboard)
        run: npm -w @esankhan3/anvil-cli run build

      - name: Publish changed packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-changed.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
