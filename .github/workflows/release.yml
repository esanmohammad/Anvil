name: Release

# Triggers on `vX.Y.Z` tag pushes. Bump the changed packages' versions
# in their respective package.json, commit, then `git tag v0.1.2 && git push --tags`.
# scripts/publish-changed.mjs reads each package.json's version and only
# publishes the ones whose version isn't already on the npm registry —
# so an unchanged sub-package is silently skipped.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # contents: write       → softprops/action-gh-release uses this to create the GitHub Release
      # id-token: write       → npm provenance OIDC token (sigstore attestation)
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        # `npm ci` famously skips platform-specific optional deps
        # (npm/cli#4828) — rollup's `@rollup/rollup-linux-x64-gnu` is the
        # canonical victim, and a missing native binary crashes vite mid-build.
        # We did publish 0.1.2 with no bundled dashboard because of this.
        # Two-step: ci for reproducibility, then a targeted install of the
        # platform native rollup binary so vite/rollup can boot.
        run: |
          npm ci
          # --no-save keeps the lockfile clean; omitting --omit=dev so we
          # don't accidentally prune existing dev-deps (e.g. @types/*)
          # that npm ci just installed.
          npm install --no-save --include=optional @rollup/rollup-linux-x64-gnu

      - name: Verify rollup native binary present
        run: node -e "require('@rollup/rollup-linux-x64-gnu')"

      # The cli's build script transitively builds dashboard (vite + tsc)
      # and bundles it into dist/dashboard. Building the cli last therefore
      # exercises every TypeScript project reference in the monorepo.
      - name: Build leaf packages
        run: |
          npm -w @esankhan3/anvil-agent-core run build
          npm -w @esankhan3/anvil-knowledge-core run build
          npm -w @esankhan3/anvil-memory-core run build
          npm -w @esankhan3/anvil-convention-core run build
          npm -w @esankhan3/anvil-core-pipeline run build

      - name: Build code-search-mcp
        run: cd packages/code-search-mcp && node build.mjs

      # code-search-mcp ships three bin entries
      # (code-search-mcp / code-search / code-search-daemon).
      # Refuse to publish if any one is missing — mirrors the
      # dashboard guard below; same shape as the 0.1.2 incident.
      - name: Verify code-search bin entries landed
        run: |
          test -f packages/code-search-mcp/dist/index.js         || { echo "::error::dist/index.js missing — refusing to publish"; exit 1; }
          test -f packages/code-search-mcp/dist/cli/index.js     || { echo "::error::dist/cli/index.js missing — refusing to publish"; exit 1; }
          test -f packages/code-search-mcp/dist/daemon/index.js  || { echo "::error::dist/daemon/index.js missing — refusing to publish"; exit 1; }

      - name: Build cli (also builds dashboard)
        run: npm -w @esankhan3/anvil-cli run build

      # Hard guard so a silently-broken dashboard build (the 0.1.2 incident)
      # never makes it onto npm again.
      - name: Verify dashboard bundle landed
        run: |
          test -f packages/cli/dist/dashboard/dist/index.html || { echo "::error::dist/dashboard/dist/index.html missing — refusing to publish"; exit 1; }
          test -f packages/cli/dist/dashboard/server/dashboard-server.js || { echo "::error::dist/dashboard/server/dashboard-server.js missing — refusing to publish"; exit 1; }

      - name: Publish changed packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-changed.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
