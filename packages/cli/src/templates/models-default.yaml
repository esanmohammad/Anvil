# ~/.anvil/models.yaml — generated by `anvil doctor --bootstrap-models`.
# Edit freely; re-running doctor only writes this file when it doesn't exist
# and never overwrites your changes.
#
# Schema:
#   - id              (str)         model id passed to the provider
#   - provider        (enum)        ollama | claude | openai | gemini | openrouter | gemini-cli | adk | opencode
#   - tier            (enum)        local | cheap | premium
#   - capabilities    (str array)   subset of [embed, rerank, code, reasoning, vision]
#   - complexity_max  (enum)        S | M | L
#   - vram_gb         (number)      0 for cloud / CPU-only models
#   - exclusive_slot  (bool)        true ⇒ goes through process-local FIFO queue
#                                   (only big GPU-resident locals; embed/rerank stay false)
#                                   MANDATORY for vram_gb >= 5 unless consumed_by=knowledge-core
#   - context_window  (int, opt)    Ollama num_ctx — caps VRAM cost of context
#   - context_tokens  (int, opt)    minimum-context filter (resolver eligibility)
#   - consumed_by     (enum, opt)   agent-core (default) | knowledge-core
#                                   marker: model is referenced in registry
#                                   but invoked directly by knowledge-core,
#                                   not the resolver

models:
  # ─── Local tier — OpenCode Go subscription ────────────────────────────
  # Hosted open-coding models behind https://opencode.ai/zen/go/v1.
  # Replaces Ollama for the local tier when OPENCODE_API_KEY is set —
  # frees the 12 GB GPU VRAM Ollama needed for qwen3:14b. Cost-counted
  # via the Go subscription ($10/mo flat) rather than per-token.
  #
  # Order matters — first model in the registry within a matching tier
  # wins. Kimi K2.6 promoted to primary because Alibaba's upstream
  # capacity for OpenCode's Qwen3.5/3.6 routes was hitting frequent
  # 429s in early testing. Qwen kept as a fallback so they're still
  # in the chain when capacity returns.
  - id: opencode/kimi-k2.6
    provider: opencode
    tier: local
    capabilities: [code, reasoning]
    complexity_max: L
    vram_gb: 0
    exclusive_slot: false
    context_window: 65536

  - id: opencode/glm-5.1
    provider: opencode
    tier: local
    capabilities: [code, reasoning]
    complexity_max: L
    vram_gb: 0
    exclusive_slot: false
    context_window: 65536

  - id: opencode/qwen3.6-plus
    provider: opencode
    tier: local
    capabilities: [code, reasoning]
    complexity_max: M
    vram_gb: 0
    exclusive_slot: false
    context_window: 32768

  - id: opencode/qwen3.5-plus
    provider: opencode
    tier: local
    capabilities: [code, reasoning]
    complexity_max: M
    vram_gb: 0
    exclusive_slot: false
    context_window: 32768

  - id: opencode/deepseek-v4-flash
    provider: opencode
    tier: local
    capabilities: [code, reasoning]
    complexity_max: S
    vram_gb: 0
    exclusive_slot: false
    context_window: 16384

  # ─── Co-resident utility models, used by knowledge-core directly ──────
  # Embed + rerank stay on Ollama because OpenCode Go doesn't host them
  # and we need them locally for the hybrid retrieval pipeline. Small
  # enough to share VRAM with whichever big model holds the GPU.
  - id: bge-m3
    provider: ollama
    tier: local
    capabilities: [embed]
    complexity_max: S
    vram_gb: 1.2
    exclusive_slot: false
    consumed_by: knowledge-core
    context_window: 8192

  - id: qwen3:0.6b
    provider: ollama
    tier: local
    capabilities: [rerank]
    complexity_max: S
    vram_gb: 0.5
    exclusive_slot: false
    consumed_by: knowledge-core
    context_window: 4096

  # ─── Cheap escalation tier (cloud) ────────────────────────────────────
  - id: claude-haiku-4-5-20251001
    provider: claude
    tier: cheap
    capabilities: [code, reasoning]
    complexity_max: M
    vram_gb: 0
    exclusive_slot: false

  # ─── Premium escalation tier (cloud) ──────────────────────────────────
  - id: claude-sonnet-4-6
    provider: claude
    tier: premium
    capabilities: [code, reasoning, vision]
    complexity_max: L
    vram_gb: 0
    exclusive_slot: false

  - id: claude-opus-4-7
    provider: claude
    tier: premium
    capabilities: [code, reasoning, vision]
    complexity_max: L
    vram_gb: 0
    exclusive_slot: false
