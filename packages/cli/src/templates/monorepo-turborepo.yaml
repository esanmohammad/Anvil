# ──────────────────────────────────────────────────────────────────────
# factory.yaml — Monorepo / Turborepo project template
# Generated by: anvil init --template monorepo-turborepo
# ──────────────────────────────────────────────────────────────────────

version: 1

project: {{PROJECT_NAME}}
title: {{PROJECT_NAME}}

workspace: {{WORKSPACE}}

repos:
  - name: web
    path: ./apps/web
    language: typescript
    commands:
      build: npx turbo build --filter=web
      test: npx turbo test --filter=web
      lint: npx turbo lint --filter=web
      format: npx prettier --write "apps/web/**/*.{ts,tsx}"

  - name: api
    path: ./apps/api
    language: typescript
    commands:
      build: npx turbo build --filter=api
      test: npx turbo test --filter=api
      lint: npx turbo lint --filter=api
      format: npx prettier --write "apps/api/**/*.ts"

  - name: packages
    path: ./packages
    language: typescript
    commands:
      build: npx turbo build --filter="./packages/*"
      test: npx turbo test --filter="./packages/*"

domain:
  description: |
    A Turborepo monorepo with web frontend, API backend, and shared packages.
    Uses pnpm workspaces for package management.

  invariants:
    - "Shared packages must not import from apps"
    - "All cross-package imports must use workspace protocol"

pipeline:
  models:
    default: claude-sonnet-4-6
