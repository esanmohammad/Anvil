# ──────────────────────────────────────────────────────────────────────
# factory.yaml — Go microservices project template
# Generated by: anvil init --template go-microservices
# ──────────────────────────────────────────────────────────────────────

version: 1

project: {{PROJECT_NAME}}
title: {{PROJECT_NAME}}

workspace: {{WORKSPACE}}

repos:
  - name: api
    path: ./api
    language: go
    commands:
      build: go build ./...
      test: go test ./...
      lint: golangci-lint run
      format: gofmt -w .

  - name: worker
    path: ./worker
    language: go
    commands:
      build: go build ./...
      test: go test ./...
      lint: golangci-lint run
      format: gofmt -w .

domain:
  description: |
    Go microservices architecture with separate API and worker services.
    Services communicate via message queues and HTTP APIs.

  invariants:
    - "All HTTP handlers must return proper error codes"
    - "Database queries must use parameterized statements"
    - "Context must be propagated through all function calls"

pipeline:
  models:
    default: claude-sonnet-4-6
