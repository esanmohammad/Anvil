# ──────────────────────────────────────────────────────────────────────
# factory.yaml — Python / FastAPI project template
# Generated by: anvil init --template python-fastapi
# ──────────────────────────────────────────────────────────────────────

version: 1

project: {{PROJECT_NAME}}
title: {{PROJECT_NAME}}

workspace: {{WORKSPACE}}

repos:
  - name: {{PROJECT_NAME}}
    path: ./{{PROJECT_NAME}}
    language: python
    commands:
      test: pytest
      lint: ruff check .
      format: ruff format .

domain:
  description: |
    A Python web API built with FastAPI.
    Uses SQLAlchemy for ORM, Alembic for migrations, and Pydantic for validation.

  invariants:
    - "All endpoints must have Pydantic request/response models"
    - "Database migrations must be reversible"
    - "All async endpoints must use async database sessions"

pipeline:
  models:
    default: claude-sonnet-4-6
