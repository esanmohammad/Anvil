# ──────────────────────────────────────────────────────────────────────
# factory.yaml — Rust / Axum project template
# Generated by: anvil init --template rust-axum
# ──────────────────────────────────────────────────────────────────────

version: 1

project: {{PROJECT_NAME}}
title: {{PROJECT_NAME}}

workspace: {{WORKSPACE}}

repos:
  - name: {{PROJECT_NAME}}
    path: ./{{PROJECT_NAME}}
    language: rust
    commands:
      build: cargo build
      test: cargo test
      lint: cargo clippy
      format: cargo fmt

domain:
  description: |
    A Rust web service built with Axum.
    Uses SQLx for database access and Tokio for async runtime.

  invariants:
    - "All error types must implement std::error::Error"
    - "No unwrap() in production code paths"
    - "All database queries must be compile-time checked with sqlx"

pipeline:
  models:
    default: claude-sonnet-4-6
