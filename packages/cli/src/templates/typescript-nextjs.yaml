# ──────────────────────────────────────────────────────────────────────
# factory.yaml — TypeScript / Next.js project template
# Generated by: anvil init --template typescript-nextjs
# ──────────────────────────────────────────────────────────────────────

version: 1

project: {{PROJECT_NAME}}
title: {{PROJECT_NAME}}

workspace: {{WORKSPACE}}

repos:
  - name: {{PROJECT_NAME}}
    path: ./{{PROJECT_NAME}}
    language: typescript
    commands:
      build: npm run build
      test: npm test
      lint: npm run lint
      format: npx prettier --write .

domain:
  description: |
    A Next.js web application with TypeScript.
    Uses App Router, React Server Components, and Tailwind CSS.

  invariants:
    - "All pages must be server-rendered by default"
    - "API routes must validate input with zod"

pipeline:
  models:
    default: claude-sonnet-4-6
