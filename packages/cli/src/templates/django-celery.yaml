# ──────────────────────────────────────────────────────────────────────
# factory.yaml — Django / Celery project template
# Generated by: anvil init --template django-celery
# ──────────────────────────────────────────────────────────────────────

version: 1

project: {{PROJECT_NAME}}
title: {{PROJECT_NAME}}

workspace: {{WORKSPACE}}

repos:
  - name: {{PROJECT_NAME}}
    path: ./{{PROJECT_NAME}}
    language: python
    commands:
      test: python manage.py test
      lint: ruff check .
      format: ruff format .

domain:
  description: |
    A Django web application with Celery for background task processing.
    Uses PostgreSQL for the database and Redis for the message broker.

  invariants:
    - "All database changes must have migrations"
    - "Celery tasks must be idempotent"
    - "All views must check permissions"

pipeline:
  models:
    default: claude-sonnet-4-6
